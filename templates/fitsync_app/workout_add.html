{% extends 'fitsync_app/base.html' %}
{% load static %}

{% block title %}New Training Program | FitSync{% endblock %}

<style>
    body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
    }

    .container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 3rem;
        box-shadow: var(--shadow-main);
        width: 100%;
        max-width: 600px;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.8rem 1.2rem;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: var(--text-primary);
        margin-bottom: 1.5rem;
    }
</style>

{% block content %}
<div class="container">
    <div class="card auth-form-container">
        <h2 class="text-center mb-2">New Training Program</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <small style="color: var(--danger);">{{ field.errors.0 }}</small>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-gold"
                style="width: 100%; margin-top: 1.5rem; padding: 1rem; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; background: var(--gold); color: #000;">Publish
                Program</button>
        </form>
    </div>
</div>
{% endblock %}
