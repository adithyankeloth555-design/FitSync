{% extends 'fitsync_app/admin_base.html' %}
{% load static %}

{% block title %}Add Trainer — FitSync{% endblock %}

{% block admin_content %}
<div class="fd-page-header fd-animate">
    <div class="fd-greeting">
        <h1>Add New Trainer <span style="font-size:1.25rem;">🏋️</span></h1>
        <p>Onboard a new coach to the team</p>
    </div>
</div>

<div style="max-width:800px" class="fd-animate fd-delay-1">
    <div class="fd-card" style="padding:2.5rem">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="fd-form-item">
                <label>Full Name</label>
                <input type="text" name="trainer_name" class="fd-form-input" placeholder="e.g. Vikram Sethi" required>
            </div>
            <div class="fd-form-grid">
                <div class="fd-form-item">
                    <label>Username</label>
                    <input type="text" name="username" class="fd-form-input" placeholder="e.g. vikram_s" required>
                </div>
                <div class="fd-form-item">
                    <label>Email</label>
                    <input type="email" name="email" class="fd-form-input" placeholder="trainer@fitsync.com" required>
                </div>
            </div>
            <div class="fd-form-grid">
                <div class="fd-form-item">
                    <label>Specialty</label>
                    <input type="text" name="specialty" class="fd-form-input" placeholder="e.g. Strength Training">
                </div>
                <div class="fd-form-item">
                    <label>Rate (₹)</label>
                    <input type="number" name="price" class="fd-form-input" value="4999">
                </div>
            </div>
            <div class="fd-form-item">
                <label>Password</label>
                <input type="password" name="password" class="fd-form-input" placeholder="Minimum 8 characters" required minlength="8">
            </div>
            <div class="fd-form-item">
                <label>Profile Photo</label>
                <input type="file" name="profile_photo" class="fd-form-input" accept="image/*">
            </div>
            <div style="display:flex;align-items:center;gap:1.5rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--fd-border)">
                <button type="submit" class="fd-btn fd-btn-primary">
                    <i class="fa-solid fa-id-card-clip"></i> Add Trainer
                </button>
                <a href="{% url 'trainer_list' %}" style="color:var(--fd-text-muted);text-decoration:none;font-weight:600;font-size:.9rem">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
