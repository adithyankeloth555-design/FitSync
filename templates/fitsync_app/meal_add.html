{% extends 'fitsync_app/base.html' %}

{% block title %}Add Meal | FitSync{% endblock %}

<style>
    body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
    }

    .container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 3rem;
        box-shadow: var(--shadow-main);
        width: 100%;
        max-width: 650px;
    }

    .text-gold {
        color: var(--gold) !important;
        font-family: var(--font-heading);
        font-size: 1.8rem;
        text-transform: uppercase;
    }

    .text-muted {
        color: var(--text-muted) !important;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.6rem;
        font-weight: 700;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.9rem 1.3rem;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-family: var(--font-main);
        transition: 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: var(--shadow-glow);
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-top: 2rem;
    }

    .btn-gold {
        background: var(--gold);
        color: #000;
        padding: 1.1rem;
        border-radius: 12px;
        font-weight: 800;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-gold:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-glow);
    }

    .btn-outline {
        display: block;
        text-align: center;
        padding: 1.1rem;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        text-decoration: none;
        font-weight: 700;
        transition: 0.3s;
    }

    .btn-outline:hover {
        background: var(--bg-tertiary);
        border-color: var(--text-primary);
    }
</style>
<div class="container">
    <div class="card">
        <h2 class="mb-2 text-gold">Add Meal to {{ diet.name }}</h2>
        <p class="text-muted mb-2">Define nutrition for a specific meal slot.</p>

        <form method="post">
            {% csrf_token %}
            <div class="dashboard-grid">
                <div class="form-group">
                    <label class="text-muted">Day</label>
                    {{ form.day }}
                </div>
                <div class="form-group">
                    <label class="text-muted">Meal Name (e.g. Breakfast)</label>
                    <input type="text" name="name" placeholder="Breakfast" required>
                </div>
                <div class="form-group">
                    <label class="text-muted">Calories (kcal)</label>
                    <input type="number" name="calories" placeholder="450" required>
                </div>
                <div class="form-group">
                    <label class="text-muted">Protein (g)</label>
                    <input type="number" name="protein" placeholder="30" required>
                </div>
                <div class="form-group">
                    <label class="text-muted">Carbs (g)</label>
                    <input type="number" name="carbs" placeholder="50" required>
                </div>
                <div class="form-group">
                    <label class="text-muted">Fats (g)</label>
                    <input type="number" name="fats" placeholder="15" required>
                </div>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Description (Ingredients)</label>
                <textarea name="description" placeholder="3 Scrambled Eggs, half avocado..." rows="3"
                    required></textarea>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Time (Optional)</label>
                <input type="time" name="time">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                <button type="submit" class="btn-gold" style="flex: 2;">Save Meal</button>
                <a href="{% url 'diet_detail' diet.id %}" class="btn-outline" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
