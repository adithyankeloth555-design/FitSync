{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | FitSync Elite</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --admin-orange: var(--gold, #f97316);
            --card-bg: var(--bg-secondary, #ffffff);
            --text-color: var(--text-primary, #1f2937);
            --input-bg: var(--bg-tertiary, #f3f4f6);
            --border-color: var(--border-color, #e5e7eb);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)),
                url('https://images.unsplash.com/photo-1540497077202-7c8a3999166f?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .login-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .branding {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #fff;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .card-header {
            margin-bottom: 2.5rem;
        }

        .card-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-color);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .card-subtitle {
            color: #6b7280;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .form-group {
            position: relative;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 1.1rem 1rem 1.1rem 3.2rem;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-color);
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            background: var(--card-bg);
            border-color: var(--admin-orange);
            outline: none;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .btn-admin {
            width: 100%;
            padding: 1.1rem;
            background: var(--admin-orange);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-admin:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(212, 175, 55, 0.4);
        }

        .messages {
            margin-bottom: 1.5rem;
        }

        .message {
            padding: 0.9rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .message.error {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .card-footer {
            margin-top: 2.5rem;
            font-size: 0.9rem;
        }

        .footer-link {
            color: #6b7280;
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 600;
        }

        .footer-link:hover {
            color: var(--admin-orange);
        }

        .admin-badge {
            background: var(--bg-primary);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="login-card">
            <div class="admin-badge">Admin Access</div>
            <div class="card-header">
                <h1 class="card-title">Management</h1>
                <p class="card-subtitle">Authorize to access command center</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <i class="fa-solid fa-user-shield"></i>
                    <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
                </div>

                <div class="form-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" name="password" class="form-control" placeholder="Security Key" required>
                </div>

                <button type="submit" class="btn-admin">Enter Command Center</button>
            </form>

            <div class="card-footer">
                <a href="{% url 'login' %}" class="footer-link">
                    <i class="fa-solid fa-arrow-left"></i> Back to Member Portal
                </a>
            </div>
        </div>
    </div>
    <script>
        // Check for saved theme preference or use system preference
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>

</html>
