{% extends 'fitsync_app/base.html' %}
{% load static %}

{% block title %}Edit Workout Program | FitSync{% endblock %}

<style>
    body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
    }

    .container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 3rem;
        box-shadow: var(--shadow-main);
        width: 100%;
        max-width: 650px;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 0.8rem 1.2rem;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: var(--text-primary);
        margin-bottom: 1.5rem;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }
</style>

{% block content %}
<div class="container">
    <div class="card auth-form-container">
        <h2 class="text-center mb-2">Edit Training Program</h2>
        <p class="text-center text-muted mb-2">Modifying: Strength Foundation</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Program Title</label>
                <input type="text" name="title" value="Strength Foundation" required>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Difficulty</label>
                    <select name="difficulty">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate" selected>Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Days per Week</label>
                    <input type="number" name="frequency" value="4" required>
                </div>
            </div>

            <div class="form-group">
                <label>Program Details</label>
                <textarea name="details"
                    rows="6">A 4-day split focusing on Bench, Squat, Deadlift, and Overhead Press. Includes supplementary isolation work for stability.</textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn-gold"
                    style="flex: 2; padding: 1rem; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; background: var(--gold); color: #000;">Save
                    Changes</button>
                <a href="{% url 'workout_list' %}" class="btn-outline"
                    style="flex: 1; display: block; text-align: center; padding: 1rem; border-radius: 10px; border: 1px solid var(--border-color); color: var(--text-primary); text-decoration: none; font-weight: 600;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
